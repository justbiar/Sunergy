  <style>/* Sunergy — Softly lit control panel aesthetic */

:root {
  /* Colors */
  --color-ink: #000000;
  --color-paper-canvas: #f6f3f1;
  --color-off-black: #242424;
  --color-pale-stone: #4e4d4d;
  --color-whisper-gray: #3d3d3d;
  --color-atmosphere-wash: #cfdaf5;
  --color-subtle-link: #333333;
  --color-faint-text: #797776;
  --color-hairline: rgba(0,0,0,0.10);
  --color-hairline-strong: rgba(0,0,0,0.16);

  /* Decorative */
  --gradient-sunset-violet: linear-gradient(rgba(255, 148, 115, 0.85) 7%, rgba(160, 181, 235, 0.85) 83.82%);
  --gradient-sky-mint: linear-gradient(rgb(160, 181, 235), rgb(167, 252, 205));
  --gradient-amber-glow: linear-gradient(270deg, rgba(226, 193, 97, 0.85) 23.5%, rgba(243, 122, 10, 0.85) 76%);

  /* Type */
  --font-mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  --font-serif: 'Instrument Serif', 'Noto Serif', ui-serif, Georgia, Cambria, 'Times New Roman', Times, serif;
  --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;

  /* Spacing */
  --section-gap: 120px;
  --card-padding: 40px;
  --element-gap: 16px;
  --page-max: 1432px;

  /* Radii */
  --radius-card: 32px;
  --radius-pill: 100px;
  --radius-tag: 2000px;

  /* Density (overridden via tweaks) */
  --density: 1;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--color-paper-canvas);
  color: var(--color-ink);
  font-family: var(--font-mono);
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a { color: inherit; text-decoration: none; }

/* ─── Type ─── */
.font-mono { font-family: var(--font-mono); }
.font-serif { font-family: var(--font-serif); font-style: normal; line-height: 1.18; }
h1.font-serif, h2.font-serif, h3.font-serif, h4.font-serif { padding-bottom: 0.08em; }
.font-sans { font-family: var(--font-sans); }

.t-caption { font-size: 11px; line-height: 1.35; letter-spacing: 0.06em; text-transform: uppercase; }
.t-body-sm { font-size: 13px; line-height: 1.35; letter-spacing: -0.01em; }
.t-body { font-size: 15px; line-height: 1.45; letter-spacing: -0.01em; }
.t-subheading { font-size: 20px; line-height: 1.2; letter-spacing: -0.02em; }
.t-heading-sm { font-size: 24px; line-height: 1.15; letter-spacing: -0.02em; }
.t-heading { font-size: 32px; line-height: 1.1; letter-spacing: -0.025em; }
.t-heading-lg { font-size: 48px; line-height: 1.05; letter-spacing: -0.03em; }
.t-display { font-size: clamp(56px, 7.4vw, 104px); line-height: 1.0; letter-spacing: -0.035em; }

.muted { color: var(--color-pale-stone); }
.faint { color: var(--color-faint-text); }

/* ─── Layout ─── */
.page { min-height: 100vh; display: flex; flex-direction: column; background: var(--color-paper-canvas); }
.wrap { width: 100%; max-width: var(--page-max); margin: 0 auto; padding: 0 32px; }
.section { padding: calc(var(--section-gap) * 0.5) 0; }
.section + .section { border-top: 1px solid var(--color-hairline); }

/* ─── Nav ─── */
.nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(246,243,241,0.86);
  backdrop-filter: saturate(140%) blur(10px);
  -webkit-backdrop-filter: saturate(140%) blur(10px);
  border-bottom: 1px solid var(--color-hairline);
}
.nav-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; }
.nav-left { display: flex; align-items: center; gap: 32px; }
.nav-right { display: flex; align-items: center; gap: 4px; }
.nav-link { padding: 8px 12px; font-size: 13px; color: var(--color-off-black); border-radius: var(--radius-pill); transition: background 120ms; cursor: pointer; }
.nav-link:hover { background: rgba(0,0,0,0.04); }
.nav-link.active { background: rgba(0,0,0,0.06); }

/* Brand mark */
.brand { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 15px; letter-spacing: -0.02em; }
.brand-mark { width: 22px; height: 22px; border-radius: 50%; background: var(--gradient-sunset-violet); position: relative; box-shadow: 0 0 0 1px rgba(0,0,0,0.12), inset 0 0 0 1px rgba(255,255,255,0.4); }
.brand-mark::after { content: ''; position: absolute; inset: 5px; border-radius: 50%; background: var(--color-paper-canvas); }
.brand-mark::before { content: ''; position: absolute; inset: 9px; border-radius: 50%; background: var(--accent, var(--color-atmosphere-wash)); }

/* ─── Buttons ─── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-family: var(--font-mono); font-size: 14px; letter-spacing: -0.01em;
  padding: 12px 20px; border-radius: var(--radius-pill); border: 1px solid transparent;
  cursor: default; transition: transform 80ms ease, background 120ms, color 120ms, border-color 120ms;
  white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-primary { background: var(--color-off-black); color: var(--color-paper-canvas); }
.btn-primary:hover { background: var(--color-ink); }
.btn-ghost { background: transparent; border-color: var(--color-off-black); color: var(--color-off-black); }
.btn-ghost:hover { background: var(--color-off-black); color: var(--color-paper-canvas); }
.btn-quiet { background: transparent; color: var(--color-off-black); padding: 8px 12px; }
.btn-quiet:hover { background: rgba(0,0,0,0.04); }
.btn-sm { padding: 8px 14px; font-size: 13px; }

/* ─── Tags / pills ─── */
.tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 6px 12px; border-radius: var(--radius-tag); border: 1px solid var(--color-off-black);
  color: var(--color-off-black); background: transparent;
}
.tag-soft { border-color: var(--color-hairline-strong); color: var(--color-pale-stone); }
.tag-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; display: inline-block; }
.tag-dot.live { background: #1f8a5b; box-shadow: 0 0 0 4px rgba(31,138,91,0.18); animation: pulse 1.6s infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 4px rgba(31,138,91,0.18); } 50% { box-shadow: 0 0 0 6px rgba(31,138,91,0.08); } }

/* ─── Cards ─── */
.card {
  background: var(--color-paper-canvas);
  border: 1px solid var(--color-hairline);
  border-radius: var(--radius-card);
  padding: var(--card-padding);
}
.card-wash {
  background: var(--accent, var(--color-atmosphere-wash));
  border: 1px solid transparent;
  border-radius: var(--radius-card);
  padding: var(--card-padding);
}
.card-ink {
  background: var(--color-ink);
  color: var(--color-paper-canvas);
  border-radius: var(--radius-card);
  padding: var(--card-padding);
}

/* ─── Hairlines & dividers ─── */
.hr { height: 1px; background: var(--color-hairline); border: 0; margin: 0; }

/* ─── Notification bar ─── */
.banner {
  background: var(--color-ink); color: var(--color-paper-canvas);
  padding: 10px 0; font-size: 12px;
}
.banner-inner { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.banner a { text-decoration: underline; text-underline-offset: 3px; text-decoration-color: rgba(246,243,241,0.5); }

/* ─── Stat number ─── */
.stat-num { font-family: var(--font-serif); font-size: clamp(40px, 5.5vw, 72px); line-height: 1.0; letter-spacing: -0.03em; }
.stat-num small { font-family: var(--font-mono); font-size: 0.28em; letter-spacing: 0.08em; text-transform: uppercase; vertical-align: super; color: var(--color-pale-stone); margin-left: 6px; }

/* ─── Marquee tickers ─── */
.ticker { display: flex; gap: 48px; white-space: nowrap; animation: ticker 40s linear infinite; }
@keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.ticker-wrap { overflow: hidden; mask: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent); -webkit-mask: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent); }

/* ─── Footer ─── */
.footer { padding: 80px 0 40px; border-top: 1px solid var(--color-hairline); }
.footer-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 32px; }
.footer h4 { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-faint-text); margin: 0 0 16px; font-weight: 500; }
.footer ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.footer a { font-size: 14px; color: var(--color-off-black); }
.footer a:hover { color: var(--color-ink); text-decoration: underline; text-underline-offset: 3px; }

/* ─── Modal ─── */
.modal-scrim { position: fixed; inset: 0; background: rgba(20,20,20,0.32); z-index: 100; display: grid; place-items: center; padding: 24px; backdrop-filter: blur(4px); }
.modal {
  width: 100%; max-width: 480px; background: var(--color-paper-canvas);
  border-radius: 28px; padding: 32px; border: 1px solid var(--color-hairline);
  box-shadow: 0 30px 80px rgba(0,0,0,0.18);
}
.modal-lg { max-width: 640px; }

/* ─── Sparkline-ish bar chart ─── */
.sparkbar { display: flex; gap: 3px; align-items: flex-end; height: 32px; }
.sparkbar i { display: block; width: 6px; background: var(--color-off-black); border-radius: 2px; opacity: 0.85; }
.sparkbar i:nth-last-child(-n+3) { background: var(--accent, var(--color-atmosphere-wash)); opacity: 1; mix-blend-mode: normal; }

/* ─── Step diagram ─── */
.step-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.step {
  background: var(--color-paper-canvas);
  border: 1px solid var(--color-hairline);
  border-radius: var(--radius-card);
  padding: 28px;
  display: flex; flex-direction: column; gap: 16px;
  position: relative; min-height: 280px;
}
.step-num { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; color: var(--color-faint-text); }
.step-title { font-family: var(--font-serif); font-size: 26px; line-height: 1.1; letter-spacing: -0.025em; }
.step-body { font-size: 13px; line-height: 1.45; color: var(--color-pale-stone); }

/* ─── Code/data window ─── */
.data-window {
  background: #0f0f0f; color: #d6d6d6;
  border-radius: 22px; padding: 20px 24px;
  font-family: var(--font-mono); font-size: 12px; line-height: 1.65;
  border: 1px solid rgba(255,255,255,0.06);
}
.data-window .k { color: #9ab2ec; }
.data-window .v { color: #f3e0b0; }
.data-window .c { color: #6c6c6c; }
.data-window .ok { color: #93e6a9; }

/* ─── Animation: subtle ─── */
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.shimmer {
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  background-size: 200% 100%;
  animation: shimmer 3s infinite;
}

@keyframes glow-pan { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(2%, -1%) scale(1.04); } }

/* ─── Responsive ─── */
@media (max-width: 960px) {
  .step-grid { grid-template-columns: 1fr 1fr; }
  .footer-grid { grid-template-columns: 1fr 1fr; }
  :root { --section-gap: 80px; --card-padding: 28px; }
}
@media (max-width: 640px) {
  .step-grid { grid-template-columns: 1fr; }
  .footer-grid { grid-template-columns: 1fr; }
  .wrap { padding: 0 20px; }
}

/* ─── Dashboard specific ─── */
.dash-hero {
  display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; align-items: stretch;
}
@media (max-width: 960px) { .dash-hero { grid-template-columns: 1fr; } }
.farm-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
@media (max-width: 800px) { .farm-grid { grid-template-columns: 1fr; } }

.kpi { display: flex; flex-direction: column; gap: 6px; }
.kpi-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-faint-text); }
.kpi-value { font-family: var(--font-serif); font-size: clamp(28px, 3.6vw, 48px); line-height: 1; letter-spacing: -0.025em; }
.kpi-value small { font-family: var(--font-mono); font-size: 0.36em; color: var(--color-pale-stone); margin-left: 8px; letter-spacing: 0; }

/* Production chart */
.chart {
  width: 100%; aspect-ratio: 16/5; min-height: 180px;
  background: var(--color-paper-canvas);
  border: 1px solid var(--color-hairline);
  border-radius: var(--radius-card);
  padding: 24px; position: relative;
}

/* Tweaks: density adjustments */
.density-tight { --section-gap: 80px; --card-padding: 28px; }
.density-airy  { --section-gap: 160px; --card-padding: 56px; }
</style>
