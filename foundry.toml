[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
solc     = "0.8.24"
optimizer        = true
optimizer_runs   = 1_000_000
via_ir           = true

[profile.default.fuzz]
runs = 1000

[rpc_endpoints]
monad_testnet = "${MONAD_TESTNET_RPC:-https://testnet-rpc.monad.xyz}"

[etherscan]
monad_testnet = { key = "${MONAD_EXPLORER_API_KEY}", url = "${MONAD_EXPLORER_URL}" }
